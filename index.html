<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROBOW | Healthy Cloud Kitchen</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f8f8f8;
            color:#333;
        }

        header{
            background:#111;
            color:white;
            padding:18px;
            text-align:center;
        }

        .hero{
            text-align:center;
            padding:60px 20px;
            background:white;
        }

        .hero h1{
            font-size:42px;
            margin-bottom:15px;
        }

        .hero p{
            font-size:20px;
            margin-bottom:30px;
            color:#666;
        }

        .btn{
            display:inline-block;
            background:#25D366;
            color:white;
            text-decoration:none;
            padding:16px 32px;
            border-radius:50px;
            font-size:20px;
            font-weight:bold;
        }

        .section{
            max-width:1000px;
            margin:auto;
            padding:60px 20px;
        }

        h2{
            text-align:center;
            margin-bottom:40px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:20px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,.08);
        }

        .price{
            color:green;
            font-size:22px;
            margin:15px 0;
            font-weight:bold;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:25px;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>
    <h1>🥗 PROBOW</h1>
</header>

<section class="hero">

<h1>Eat Healthy.<br>Live Better.</h1>

<p>Fresh Salads • Rice Bowls • Smoothies</p>

<a class="btn"
href="https://wa.me/91YOURNUMBER?text=Hi%20PROBOW,%20I%20want%20to%20place%20an%20order.">
Order on WhatsApp
</a>

</section>

<section class="section">

<h2>Our Best Sellers</h2>

<div class="cards">

<div class="card">
<h3>WalkTak Salad</h3>
<p class="price">₹249</p>
</div>

<div class="card">
<h3>Tabbouleh Bowl</h3>
<p class="price">₹279</p>
</div>

<div class="card">
<h3>Rice Bowl</h3>
<p class="price">₹299</p>
</div>

</div>

</section>

<footer>

<h3>PROBOW</h3>

<p>Healthy Cloud Kitchen</p>

</footer>

</html>
